<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>诗栖 - 今日</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="assets/styles.css" />
    <script defer src="assets/app.js"></script>
  </head>
  <body class="prototype-screen">
    <div class="app-screen">
      <div class="status-bar">
        <span>9:41</span>
        <div class="dynamic-island"></div>
        <div class="status-icons">
          <i class="fa-solid fa-signal"></i>
          <i class="fa-solid fa-wifi"></i>
          <i class="fa-solid fa-battery-three-quarters"></i>
        </div>
      </div>

      <header class="nav-bar">
        <div>
          <h1 class="nav-title">诗栖</h1>
          <div class="nav-subtitle">五月初一 · 宜读山水</div>
        </div>
        <div class="nav-actions">
          <button class="icon-button" aria-label="日历"><i class="fa-regular fa-calendar"></i></button>
          <button class="icon-button" aria-label="提醒"><i class="fa-regular fa-bell"></i></button>
        </div>
      </header>

      <main class="screen-content">
        <section
          class="image-card light-overlay p-5 min-h-[250px] flex flex-col justify-between"
          style="--image: url('https://images.unsplash.com/photo-1765188989413-b0f07270cd63?auto=format&fit=crop&w=900&q=80')"
        >
          <div class="flex items-center justify-between">
            <span class="pill dark"><i class="fa-solid fa-feather"></i> 今日一首</span>
            <button class="icon-button !bg-white/20 !text-white !border-white/20" data-favorite aria-label="收藏">
              <i class="fa-regular fa-heart"></i>
            </button>
          </div>
          <div>
            <h2 class="serif text-[30px] leading-tight font-bold">春江花月夜</h2>
            <p class="mt-2 text-sm text-white/85">张若虚 · 唐</p>
            <p class="serif mt-5 text-[22px] leading-[1.75]">
              春江潮水连海平<br />
              海上明月共潮生
            </p>
            <div class="mt-5 flex gap-3">
              <button class="primary-button" data-play><i class="fa-solid fa-play"></i> 朗读</button>
              <button class="secondary-button"><i class="fa-solid fa-book-open"></i> 进入赏读</button>
            </div>
          </div>
        </section>

        <section class="section-title">
          <h2>今日进度</h2>
          <span>连续 12 天</span>
        </section>

        <section class="soft-card p-4">
          <div class="flex items-center gap-4">
            <div class="relative w-[74px] h-[74px] rounded-full grid place-items-center bg-white">
              <div class="absolute inset-[6px] rounded-full border-[7px] border-[#dce9df]"></div>
              <div class="absolute inset-[6px] rounded-full border-[7px] border-[var(--jade)] border-r-transparent rotate-45"></div>
              <strong class="relative text-lg">72%</strong>
            </div>
            <div class="min-w-0 flex-1">
              <div class="mini-label">本周雅集</div>
              <strong class="block mt-1 text-[19px]">已读 18 首 · 记诵 6 首</strong>
              <div class="mt-3 progress-track"><div class="progress-fill" style="--progress: 72%"></div></div>
            </div>
          </div>
        </section>

        <section class="section-title">
          <h2>继续</h2>
          <span>3 分钟</span>
        </section>
        <article class="row-card">
          <div class="avatar">王</div>
          <div class="row-main">
            <strong>山居秋暝</strong>
            <span>空山新雨后，天气晚来秋</span>
          </div>
          <button class="icon-button" data-play aria-label="播放"><i class="fa-solid fa-play"></i></button>
        </article>

        <section class="section-title">
          <h2>诗境</h2>
          <span>换一批</span>
        </section>
        <div class="grid grid-cols-2 gap-3">
          <article
            class="image-card p-4 h-[150px] flex flex-col justify-end"
            style="--image: url('https://images.unsplash.com/photo-1744782793756-ef240aacfb30?auto=format&fit=crop&w=700&q=80')"
          >
            <strong class="serif text-xl">竹里清音</strong>
            <span class="text-xs text-white/80 mt-1">12 首</span>
          </article>
          <article
            class="image-card p-4 h-[150px] flex flex-col justify-end"
            style="--image: url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=700&q=80')"
          >
            <strong class="serif text-xl">远山入梦</strong>
            <span class="text-xs text-white/80 mt-1">18 首</span>
          </article>
        </div>
      </main>

      <nav class="tab-bar" aria-label="主导航">
        <a class="tab-item active" href="home.html"><i class="fa-solid fa-house"></i><span>今日</span></a>
        <a class="tab-item" href="discover.html"><i class="fa-solid fa-compass"></i><span>发现</span></a>
        <a class="tab-item" href="practice.html"><i class="fa-solid fa-pen-nib"></i><span>练习</span></a>
        <a class="tab-item" href="library.html"><i class="fa-solid fa-book-bookmark"></i><span>收藏</span></a>
        <a class="tab-item" href="profile.html"><i class="fa-solid fa-user"></i><span>我的</span></a>
      </nav>
      <div class="home-indicator"></div>
    </div>
  </body>
</html>
