<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>死了么 - 报平安</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="assets/styles.css" />
  </head>
  <body class="app-body">
    <main class="app-screen">
      <div class="statusbar">
        <span data-now>09:41</span>
        <span class="dynamic-island"></span>
        <span class="signal-icons"><i class="fa-solid fa-signal"></i><i class="fa-solid fa-wifi"></i><i class="fa-solid fa-battery-three-quarters"></i></span>
      </div>

      <header class="topbar">
        <button class="icon-btn" aria-label="返回"><i class="fa-solid fa-chevron-left"></i></button>
        <div class="text-center">
          <h1>每日一问</h1>
          <span class="sub">灵魂在线确认</span>
        </div>
        <button class="icon-btn" aria-label="更多"><i class="fa-solid fa-ellipsis"></i></button>
      </header>

      <section class="content">
        <section class="soft-band p-5">
          <div class="pill mb-4"><i class="fa-solid fa-mug-hot text-[#ff6f61]"></i> 第 17 天续命成功候选</div>
          <div class="title-xl">今天你本人还在吗？</div>
          <p class="muted mt-3 text-[13px] font-semibold">请选择最贴合你当前精神状态的离谱答案。</p>
          <div class="mt-5 grid gap-2">
            <label class="card flex cursor-pointer items-center gap-3 p-3">
              <input class="accent-emerald-500" type="radio" name="mood" checked />
              <span class="text-sm font-extrabold">人在，魂有 70% 电量</span>
            </label>
            <label class="card flex cursor-pointer items-center gap-3 p-3">
              <input class="accent-emerald-500" type="radio" name="mood" />
              <span class="text-sm font-extrabold">快碎了，但还会回消息</span>
            </label>
            <label class="card flex cursor-pointer items-center gap-3 p-3">
              <input class="accent-emerald-500" type="radio" name="mood" />
              <span class="text-sm font-extrabold">在床上，非永久离线</span>
            </label>
          </div>
          <button class="btn-coral mt-5 w-full" data-toast-target="#checkin-toast"><i class="fa-solid fa-fingerprint"></i> 提交今日存活证明</button>
        </section>

        <div id="checkin-toast" class="fixed left-8 right-8 bottom-[98px] z-30 translate-y-3 rounded-full bg-[#17211d] px-4 py-3 text-center text-sm font-extrabold text-white opacity-0 pointer-events-none transition-all">
          已续命，系统替你大喊：活着呢
        </div>

        <section class="section-title">
          <span>发给亲友的话</span>
          <span class="meta">可编辑</span>
        </section>

        <section class="card p-4">
          <textarea class="h-[88px] w-full resize-none rounded-[8px] border border-black/10 bg-white/80 p-3 text-[14px] font-bold leading-relaxed outline-none focus:border-emerald-400" aria-label="平安消息">今天还活着，精神状态像没加载完的网页，但人没掉线。</textarea>
          <div class="mt-3 flex flex-wrap gap-2">
            <span class="chip">别催</span>
            <span class="chip">在活了</span>
            <span class="chip">先别报警</span>
          </div>
        </section>

        <section class="section-title">
          <span>自动兜底规则</span>
          <span class="pill bg-emerald-50 text-emerald-700"><i class="fa-solid fa-toggle-on"></i> 开</span>
        </section>

        <section class="card px-4">
          <div class="list-row">
            <div><strong>每日 21:30 前打卡</strong><span>超过 30 分钟进入轻微阴间提醒</span></div>
            <i class="fa-solid fa-clock text-emerald-600"></i>
          </div>
          <div class="list-row">
            <div><strong>连续未回 3 次</strong><span>通知守护人上门看一眼</span></div>
            <i class="fa-solid fa-user-shield text-[#ff6f61]"></i>
          </div>
          <div class="list-row">
            <div><strong>门锁 / 手环无活动</strong><span>升级为“别真没了”预警</span></div>
            <i class="fa-solid fa-door-closed text-[#ffb84c]"></i>
          </div>
        </section>
      </section>

      <nav class="tabbar" aria-label="底部导航">
        <a class="tab-item" href="home.html"><i class="fa-solid fa-house"></i><span>首页</span></a>
        <a class="tab-item active" href="checkin.html"><i class="fa-solid fa-heart-pulse"></i><span>报平安</span></a>
        <a class="tab-item" href="alerts.html"><i class="fa-solid fa-bell"></i><span>预警</span></a>
        <a class="tab-item" href="profile.html"><i class="fa-solid fa-user-astronaut"></i><span>我的</span></a>
      </nav>
    </main>
    <script src="assets/app.js"></script>
  </body>
</html>
