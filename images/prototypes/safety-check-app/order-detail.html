<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>死了么 - 订单详情</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="assets/styles.css" />
  </head>
  <body class="app-body">
    <main class="app-screen">
      <div class="statusbar">
        <span data-now>09:41</span>
        <span class="dynamic-island"></span>
        <span class="signal-icons"><i class="fa-solid fa-signal"></i><i class="fa-solid fa-wifi"></i><i class="fa-solid fa-battery-three-quarters"></i></span>
      </div>

      <header class="topbar">
        <button class="icon-btn" aria-label="返回"><i class="fa-solid fa-chevron-left"></i></button>
        <div class="text-center">
          <h1>安全查看单</h1>
          <span class="sub">订单 #DLM-0921</span>
        </div>
        <button class="icon-btn" aria-label="分享"><i class="fa-solid fa-share-nodes"></i></button>
      </header>

      <section class="content">
        <section class="card p-4">
          <div class="flex items-center justify-between">
            <span class="pill bg-emerald-50 text-emerald-700"><i class="fa-solid fa-motorcycle"></i> 骑手已出发</span>
            <span class="meta">预计 12 分钟</span>
          </div>
          <div class="mt-4 h-[150px] rounded-[8px] bg-cover bg-center" style="background-image: url('https://images.unsplash.com/photo-1524661135-423995f22d0b?auto=format&fit=crop&w=900&q=80');"></div>
          <div class="mt-4 flex items-center gap-3">
            <img class="avatar" src="https://images.unsplash.com/photo-1566576721346-d4a3b4eaeb55?auto=format&fit=crop&w=160&q=80" alt="骑手" />
            <div class="flex-1">
              <strong class="block text-sm font-black">阿强师傅</strong>
              <span class="meta">正在赶往“滨江快乐独居小区”</span>
            </div>
            <button class="icon-btn" aria-label="电话"><i class="fa-solid fa-phone"></i></button>
          </div>
        </section>

        <section class="section-title">
          <span>流程留痕</span>
          <span class="meta">全程可追溯</span>
        </section>

        <section class="card p-4">
          <div class="timeline">
            <div class="timeline-item">
              <strong class="block text-sm font-black">守护人确认授权</strong>
              <span class="meta">22:21 · 阿北同意安全查看</span>
            </div>
            <div class="timeline-item">
              <strong class="block text-sm font-black">骑手接单</strong>
              <span class="meta">22:23 · 已阅读隐私边界</span>
            </div>
            <div class="timeline-item">
              <strong class="block text-sm font-black">联系用户</strong>
              <span class="meta">22:29 · 电话无人接听，继续轻敲</span>
            </div>
          </div>
        </section>

        <section class="section-title">
          <span>可执行动作</span>
          <span class="meta">按授权解锁</span>
        </section>

        <section class="grid grid-cols-2 gap-3">
          <button class="card p-4 text-left">
            <i class="fa-solid fa-phone-volume text-xl text-emerald-600"></i>
            <strong class="mt-3 block text-sm font-black">继续呼叫</strong>
            <span class="meta">先礼貌轰炸</span>
          </button>
          <button class="card p-4 text-left">
            <i class="fa-solid fa-door-open text-xl text-[#ff6f61]"></i>
            <strong class="mt-3 block text-sm font-black">物业协助</strong>
            <span class="meta">需二次确认</span>
          </button>
        </section>

        <section class="soft-band mt-3 p-4">
          <strong class="block text-sm font-black">善后原则</strong>
          <p class="muted mt-2 text-[13px] font-semibold leading-relaxed">先确认安全，再联系亲友，必要时对接正规机构。主打一个人可以社恐，流程不能离谱。</p>
        </section>
      </section>

      <nav class="tabbar" aria-label="底部导航">
        <a class="tab-item" href="home.html"><i class="fa-solid fa-house"></i><span>首页</span></a>
        <a class="tab-item" href="checkin.html"><i class="fa-solid fa-heart-pulse"></i><span>报平安</span></a>
        <a class="tab-item active" href="alerts.html"><i class="fa-solid fa-bell"></i><span>预警</span></a>
        <a class="tab-item" href="profile.html"><i class="fa-solid fa-user-astronaut"></i><span>我的</span></a>
      </nav>
    </main>
    <script src="assets/app.js"></script>
  </body>
</html>
