<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NOVA Todo - Task Detail</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body class="prototype-page">
  <div class="phone">
    <div class="dynamic-island"></div>
    <div class="status-bar">
      <span data-status-time>9:41</span>
      <div class="status-icons">
        <i class="fa-solid fa-signal"></i>
        <i class="fa-solid fa-wifi"></i>
        <i class="fa-solid fa-battery-three-quarters"></i>
      </div>
    </div>

    <main class="app-content">
      <header class="top-chrome">
        <a class="icon-button" href="home.html" aria-label="返回">
          <i class="fa-solid fa-chevron-left"></i>
        </a>
        <div class="flex items-center gap-2">
          <button class="icon-button" aria-label="更多操作">
            <i class="fa-solid fa-ellipsis"></i>
          </button>
        </div>
      </header>

      <section class="black-panel p-5">
        <div class="flex items-center gap-2">
          <span class="tag-chip tag-coral">P1</span>
          <span class="tag-chip tag-blue">Strategy</span>
          <span class="tag-chip">今天 10:00</span>
        </div>
        <h1 class="mt-5 mb-0 text-[31px] leading-[1.06] font-black">整理发布会 Todo 的边界条件</h1>
        <p class="mt-4 text-[13px] leading-6 text-white/62 font-semibold">明确哪些事项必须进入首版，哪些放入后续迭代，避免发布会前的任务列表继续膨胀。</p>
        <div class="mt-5 flex items-center justify-between">
          <div class="flex -space-x-2">
            <img class="h-9 w-9 rounded-full border-2 border-[#17191e] object-cover" src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&w=120&q=80" alt="Member">
            <img class="h-9 w-9 rounded-full border-2 border-[#17191e] object-cover" src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?auto=format&fit=crop&w=120&q=80" alt="Member">
            <img class="h-9 w-9 rounded-full border-2 border-[#17191e] object-cover" src="https://images.unsplash.com/photo-1544723795-3fb6469f5b39?auto=format&fit=crop&w=120&q=80" alt="Member">
          </div>
          <button class="primary-button lime !h-11">
            <i class="fa-solid fa-play"></i>
            专注
          </button>
        </div>
      </section>

      <section class="section-heading">
        <h2>执行清单</h2>
        <span class="tag-chip">3 / 5</span>
      </section>

      <div class="task-list">
        <article class="task-row is-muted">
          <button class="check-dot is-done" data-task-toggle aria-label="完成子任务">
            <i class="fa-solid fa-check text-[12px]"></i>
          </button>
          <div>
            <p class="task-title">收集各负责人待办项</p>
            <p class="task-meta">Mina · 已同步</p>
          </div>
          <i class="fa-solid fa-grip-lines text-[#9ca397]"></i>
        </article>
        <article class="task-row">
          <button class="check-dot" data-task-toggle aria-label="完成子任务">
            <i class="fa-solid fa-check text-[12px]"></i>
          </button>
          <div>
            <p class="task-title">标记阻塞项和依赖关系</p>
            <p class="task-meta">预计 20m · 需要确认</p>
          </div>
          <i class="fa-solid fa-grip-lines text-[#9ca397]"></i>
        </article>
        <article class="task-row">
          <button class="check-dot" data-task-toggle aria-label="完成子任务">
            <i class="fa-solid fa-check text-[12px]"></i>
          </button>
          <div>
            <p class="task-title">输出一个 24h 决策版本</p>
            <p class="task-meta">Owner: You</p>
          </div>
          <i class="fa-solid fa-grip-lines text-[#9ca397]"></i>
        </article>
      </div>

      <section class="section-heading">
        <h2>任务属性</h2>
      </section>

      <section class="panel p-4">
        <div class="toggle-row">
          <div>
            <p class="m-0 text-[14px] font-black">截止时间</p>
            <p class="mt-1 text-[12px] font-bold text-[#70746d]">今天 12:00 前</p>
          </div>
          <i class="fa-solid fa-chevron-right text-[#9ca397]"></i>
        </div>
        <div class="toggle-row">
          <div>
            <p class="m-0 text-[14px] font-black">重复规则</p>
            <p class="mt-1 text-[12px] font-bold text-[#70746d]">不重复</p>
          </div>
          <i class="fa-solid fa-chevron-right text-[#9ca397]"></i>
        </div>
        <div class="toggle-row !border-b-0">
          <div>
            <p class="m-0 text-[14px] font-black">完成后归档</p>
            <p class="mt-1 text-[12px] font-bold text-[#70746d]">隐藏在今日列表</p>
          </div>
          <div class="switch on"></div>
        </div>
      </section>
    </main>

    <nav class="tab-bar" aria-label="底部导航">
      <a class="tab-item active" href="home.html"><i class="fa-solid fa-house"></i><span>今日</span></a>
      <a class="tab-item" href="inbox.html"><i class="fa-solid fa-inbox"></i><span>收件</span></a>
      <a class="tab-item" href="project.html"><i class="fa-solid fa-layer-group"></i><span>项目</span></a>
      <a class="tab-item" href="calendar.html"><i class="fa-regular fa-calendar"></i><span>日历</span></a>
      <a class="tab-item" href="profile.html"><i class="fa-regular fa-user"></i><span>我的</span></a>
    </nav>
    <div class="home-indicator"></div>
  </div>
  <script src="assets/app.js"></script>
</body>
</html>
