<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>闪映 · 发现</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="shared.css">
</head>
<body class="prototype-body">
  <div class="device-frame" role="img" aria-label="iPhone 15 原型外框">
    <main class="device-screen screen-light">
      <div class="status-bar" aria-hidden="true">
        <span class="js-time">9:41</span>
        <span class="status-icons"><i class="fa-solid fa-signal"></i><i class="fa-solid fa-wifi"></i><span class="battery"></span></span>
      </div>

      <section class="page">
        <header class="top-nav">
          <div>
            <p class="m-0 text-xs font-extrabold uppercase text-[#21a9bb]">Discover</p>
            <h1 class="m-0 text-2xl font-black tracking-[0px]">发现趋势</h1>
          </div>
          <button class="icon-circle" type="button" data-toast="已打开扫码入口" aria-label="扫码">
            <i class="fa-solid fa-qrcode"></i>
          </button>
        </header>

        <label class="mt-5 flex h-12 items-center gap-3 rounded-full bg-white px-4 shadow-sm ring-1 ring-slate-200" aria-label="搜索短视频">
          <i class="fa-solid fa-magnifying-glass text-slate-400"></i>
          <input class="w-full bg-transparent text-sm font-semibold outline-none placeholder:text-slate-400" type="search" placeholder="搜索话题、创作者或音乐">
        </label>

        <div class="mt-4 flex gap-2 overflow-x-auto pb-1" aria-label="内容分类">
          <button class="chip is-active" data-group="discover" aria-pressed="true" type="button">为你精选</button>
          <button class="chip" data-group="discover" aria-pressed="false" type="button">本地</button>
          <button class="chip" data-group="discover" aria-pressed="false" type="button">美食</button>
          <button class="chip" data-group="discover" aria-pressed="false" type="button">运动</button>
          <button class="chip" data-group="discover" aria-pressed="false" type="button">学习</button>
        </div>

        <section class="mt-5 rounded-[28px] bg-[#07111f] p-4 text-white shadow-xl" aria-labelledby="trend-title">
          <div class="flex items-start justify-between gap-3">
            <div>
              <h2 id="trend-title" class="m-0 text-lg font-black">今晚热榜</h2>
              <p class="m-0 mt-1 text-xs leading-5 text-slate-300">基于本地热度、关注关系和观看完成率排序。</p>
            </div>
            <span class="pill bg-white text-[#07111f]">实时</span>
          </div>
          <div class="mt-4 grid grid-cols-3 gap-3">
            <article class="rounded-2xl bg-white/10 p-3">
              <p class="m-0 text-xl font-black">#1</p>
              <p class="m-0 mt-2 text-xs font-bold text-slate-200">夜跑路线</p>
            </article>
            <article class="rounded-2xl bg-white/10 p-3">
              <p class="m-0 text-xl font-black">#2</p>
              <p class="m-0 mt-2 text-xs font-bold text-slate-200">省钱晚餐</p>
            </article>
            <article class="rounded-2xl bg-white/10 p-3">
              <p class="m-0 text-xl font-black">#3</p>
              <p class="m-0 mt-2 text-xs font-bold text-slate-200">城市光影</p>
            </article>
          </div>
        </section>

        <div class="mt-5 flex items-center justify-between">
          <h2 class="m-0 text-lg font-black">热门短片</h2>
          <button class="text-sm font-extrabold text-[#168b9a]" type="button" data-toast="已切换排序">换一批</button>
        </div>

        <section class="mt-3 grid grid-cols-2 gap-3" aria-label="热门短片列表">
          <article class="thumb rounded-[22px]">
            <img src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1?auto=format&fit=crop&w=520&q=82" alt="人物肖像短视频封面">
            <span class="thumb-stat"><i class="fa-solid fa-play"></i> 2.1M</span>
          </article>
          <article class="thumb rounded-[22px]">
            <img src="https://images.unsplash.com/photo-1469474968028-56623f02e42e?auto=format&fit=crop&w=520&q=82" alt="自然风景短视频封面">
            <span class="thumb-stat"><i class="fa-solid fa-play"></i> 845k</span>
          </article>
          <article class="thumb rounded-[22px]">
            <img src="https://images.unsplash.com/photo-1554284126-aa88f22d8b74?auto=format&fit=crop&w=520&q=82" alt="健身训练短视频封面">
            <span class="thumb-stat"><i class="fa-solid fa-play"></i> 530k</span>
          </article>
          <article class="thumb rounded-[22px]">
            <img src="https://images.unsplash.com/photo-1511632765486-a01980e01a18?auto=format&fit=crop&w=520&q=82" alt="朋友聚会短视频封面">
            <span class="thumb-stat"><i class="fa-solid fa-play"></i> 392k</span>
          </article>
        </section>
      </section>

      <nav class="tab-bar" aria-label="主导航">
        <a class="tab-item" href="home.html"><i class="fa-solid fa-house"></i><span>首页</span></a>
        <a class="tab-item active" href="discover.html" aria-current="page"><i class="fa-solid fa-magnifying-glass"></i><span>发现</span></a>
        <a class="tab-create" href="create.html" aria-label="创作"><i class="fa-solid fa-plus"></i></a>
        <a class="tab-item" href="inbox.html"><i class="fa-solid fa-inbox"></i><span>消息</span></a>
        <a class="tab-item" href="profile.html"><i class="fa-solid fa-user"></i><span>我的</span></a>
      </nav>
    </main>
  </div>
  <script src="prototype.js"></script>
</body>
</html>
