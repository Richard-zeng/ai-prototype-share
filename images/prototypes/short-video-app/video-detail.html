<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>闪映 · 视频详情</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="shared.css">
</head>
<body class="prototype-body">
  <div class="device-frame" role="img" aria-label="iPhone 15 原型外框">
    <main class="device-screen screen-dark">
      <div class="status-bar" aria-hidden="true">
        <span class="js-time">9:41</span>
        <span class="status-icons"><i class="fa-solid fa-signal"></i><i class="fa-solid fa-wifi"></i><span class="battery"></span></span>
      </div>

      <section class="absolute inset-0">
        <img class="h-full w-full object-cover" src="https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?auto=format&fit=crop&w=900&q=82" alt="视频详情背景">
        <div class="absolute inset-0 bg-black/42"></div>
      </section>

      <section class="page relative">
        <header class="top-nav">
          <a class="icon-circle" href="home.html" aria-label="返回首页"><i class="fa-solid fa-chevron-left"></i></a>
          <h1 class="m-0 text-base font-black">评论</h1>
          <button class="icon-circle" type="button" data-toast="已打开分享面板" aria-label="分享"><i class="fa-solid fa-share"></i></button>
        </header>

        <div class="absolute bottom-0 left-0 right-0 rounded-t-[36px] bg-[#f8fafc] p-5 pb-7 text-[#101827] shadow-2xl">
          <div class="mx-auto mb-4 h-1 w-12 rounded-full bg-slate-300"></div>
          <div class="flex items-center justify-between">
            <h2 class="m-0 text-xl font-black">1,246 条评论</h2>
            <button class="text-sm font-black text-[#168b9a]" type="button" data-toast="已按热度排序">热度</button>
          </div>

          <div class="mt-4 grid gap-4" aria-label="评论列表">
            <article class="row-item">
              <img class="avatar-sm" src="https://images.unsplash.com/photo-1508214751196-bcfd4ca60f91?auto=format&fit=crop&w=200&q=82" alt="Mina 头像">
              <div>
                <h3 class="m-0 text-sm font-black">Mina</h3>
                <p class="m-0 mt-1 text-sm leading-5 text-slate-600">这个字幕节奏刚好，想要模板编号。</p>
              </div>
              <button class="grid gap-1 text-center text-xs font-bold text-slate-400" type="button" data-toggle aria-pressed="false" data-toast="评论喜欢已切换" aria-label="喜欢评论"><i class="fa-regular fa-heart"></i><span>421</span></button>
            </article>
            <article class="row-item">
              <img class="avatar-sm" src="https://images.unsplash.com/photo-1568602471122-7832951cc4c5?auto=format&fit=crop&w=200&q=82" alt="Kai 头像">
              <div>
                <h3 class="m-0 text-sm font-black">Kai</h3>
                <p class="m-0 mt-1 text-sm leading-5 text-slate-600">夜市灯光太适合拍穿搭了。</p>
              </div>
              <button class="grid gap-1 text-center text-xs font-bold text-slate-400" type="button" data-toggle aria-pressed="false" data-toast="评论喜欢已切换" aria-label="喜欢评论"><i class="fa-regular fa-heart"></i><span>98</span></button>
            </article>
            <article class="row-item">
              <span class="grid h-9 w-9 place-items-center rounded-full bg-[#e5fbff] text-[#168b9a]"><i class="fa-solid fa-shield-heart"></i></span>
              <div>
                <h3 class="m-0 text-sm font-black">评论保护</h3>
                <p class="m-0 mt-1 text-sm leading-5 text-slate-600">已隐藏 2 条可能造成不适的评论。</p>
              </div>
              <button class="text-xs font-black text-[#168b9a]" type="button" data-toast="已打开审核列表">查看</button>
            </article>
          </div>

          <form class="mt-5 flex items-center gap-2" aria-label="发表评论" onsubmit="event.preventDefault(); window.showToast?.('评论已发送');">
            <label class="flex h-12 flex-1 items-center gap-2 rounded-full bg-slate-100 px-4">
              <i class="fa-regular fa-face-smile text-slate-400"></i>
              <input class="w-full bg-transparent text-sm font-semibold outline-none placeholder:text-slate-400" type="text" placeholder="友善表达你的想法">
            </label>
            <button class="grid h-12 w-12 place-items-center rounded-full bg-[#21d4e8] text-[#07111f]" type="submit" aria-label="发送评论"><i class="fa-solid fa-paper-plane"></i></button>
          </form>
        </div>
      </section>
    </main>
  </div>
  <script src="prototype.js"></script>
</body>
</html>
