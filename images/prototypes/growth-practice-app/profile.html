<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>XX 我的</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="phone-wrap">
      <section class="phone-shell">
        <div class="app-screen">
          <div class="status-bar">
            <span>9:41</span>
            <div class="dynamic-island"></div>
            <span class="flex items-center gap-1"><i class="fa-solid fa-signal"></i><i class="fa-solid fa-wifi"></i><i class="fa-solid fa-battery-three-quarters"></i></span>
          </div>

          <div class="app-content">
            <header class="mb-5 flex items-center justify-between">
              <div>
                <p class="text-sm font-black text-slate-500">个人中心</p>
                <h1 class="mt-1 text-3xl font-black text-slate-950">林夏的成长档案</h1>
              </div>
              <button class="icon-button" data-action="edit" aria-label="编辑"><i class="fa-solid fa-gear"></i></button>
            </header>

            <section class="soft-card overflow-hidden">
              <div class="relative h-40">
                <img class="h-full w-full object-cover" src="https://images.unsplash.com/photo-1517841905240-472988babdf9?auto=format&fit=crop&w=900&q=85" alt="个人封面" />
                <div class="absolute inset-0 bg-gradient-to-t from-slate-950/45 to-transparent"></div>
              </div>
              <div class="-mt-10 px-5 pb-5 relative">
                <img class="h-20 w-20 rounded-3xl object-cover ring-4 ring-white" src="https://images.unsplash.com/photo-1527980965255-d3b416303d12?auto=format&fit=crop&w=220&q=80" alt="用户头像" />
                <div class="mt-4 flex items-start justify-between">
                  <div>
                    <h2 class="text-2xl font-black">林夏</h2>
                    <p class="mt-1 text-sm font-medium text-slate-500">产品经理 · 正在练习稳定输出</p>
                  </div>
                  <span class="chip bg-amber-100 text-amber-700"><i class="fa-solid fa-crown"></i>高级版</span>
                </div>
              </div>
            </section>

            <section class="mt-6 grid grid-cols-3 gap-3">
              <article class="tiny-card p-4 text-center">
                <p class="text-2xl font-black">21</p>
                <p class="mt-1 text-xs font-black text-slate-500">连续打卡</p>
              </article>
              <article class="tiny-card p-4 text-center">
                <p class="text-2xl font-black">36</p>
                <p class="mt-1 text-xs font-black text-slate-500">完成练习</p>
              </article>
              <article class="tiny-card p-4 text-center">
                <p class="text-2xl font-black">12</p>
                <p class="mt-1 text-xs font-black text-slate-500">收藏课程</p>
              </article>
            </section>

            <section class="mt-6 soft-card p-5">
              <div class="mb-4 flex items-center justify-between">
                <h2 class="text-xl font-black">成长徽章</h2>
                <a class="text-sm font-black text-blue-600" href="insights.html">查看洞察</a>
              </div>
              <div class="grid grid-cols-4 gap-3">
                <div class="rounded-3xl bg-blue-100 p-3 text-center text-blue-600"><i class="fa-solid fa-seedling text-2xl"></i><p class="mt-2 text-xs font-black">起步</p></div>
                <div class="rounded-3xl bg-emerald-100 p-3 text-center text-emerald-600"><i class="fa-solid fa-fire text-2xl"></i><p class="mt-2 text-xs font-black">连胜</p></div>
                <div class="rounded-3xl bg-violet-100 p-3 text-center text-violet-600"><i class="fa-solid fa-moon text-2xl"></i><p class="mt-2 text-xs font-black">复盘</p></div>
                <div class="rounded-3xl bg-amber-100 p-3 text-center text-amber-600"><i class="fa-solid fa-star text-2xl"></i><p class="mt-2 text-xs font-black">心流</p></div>
              </div>
            </section>

            <section class="mt-6 soft-card p-3">
              <a class="flex items-center gap-4 rounded-3xl p-3" href="courses.html">
                <span class="flex h-11 w-11 items-center justify-center rounded-2xl bg-blue-100 text-blue-600"><i class="fa-solid fa-bookmark"></i></span>
                <span class="min-w-0 flex-1 font-black">我的收藏</span>
                <i class="fa-solid fa-chevron-right text-slate-400"></i>
              </a>
              <a class="flex items-center gap-4 rounded-3xl p-3" href="community.html">
                <span class="flex h-11 w-11 items-center justify-center rounded-2xl bg-rose-100 text-rose-600"><i class="fa-solid fa-user-group"></i></span>
                <span class="min-w-0 flex-1 font-black">共修伙伴</span>
                <i class="fa-solid fa-chevron-right text-slate-400"></i>
              </a>
              <button class="flex w-full items-center gap-4 rounded-3xl p-3 text-left" data-action="sync">
                <span class="flex h-11 w-11 items-center justify-center rounded-2xl bg-slate-100 text-slate-700"><i class="fa-solid fa-bell"></i></span>
                <span class="min-w-0 flex-1 font-black">通知与提醒</span>
                <i class="fa-solid fa-chevron-right text-slate-400"></i>
              </button>
            </section>
          </div>

          <nav class="bottom-tab" style="--tabs: 6;">
            <a class="tab-item" href="today.html"><i class="fa-solid fa-house"></i><span>今日</span></a>
            <a class="tab-item" href="courses.html"><i class="fa-solid fa-book-open"></i><span>课程</span></a>
            <a class="tab-item" href="plan.html"><i class="fa-solid fa-calendar"></i><span>计划</span></a>
            <a class="tab-item" href="insights.html"><i class="fa-solid fa-chart-simple"></i><span>洞察</span></a>
            <a class="tab-item" href="community.html"><i class="fa-solid fa-users"></i><span>社群</span></a>
            <a class="tab-item active" href="profile.html"><i class="fa-solid fa-user"></i><span>我的</span></a>
          </nav>
        </div>
      </section>
    </main>
    <div class="floating-toast" data-toast></div>
    <script src="app.js"></script>
  </body>
</html>
