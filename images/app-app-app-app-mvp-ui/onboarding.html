<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>闪映 · 引导</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="shared.css">
</head>
<body class="prototype-body">
  <div class="device-frame" role="img" aria-label="iPhone 15 原型外框">
    <main class="device-screen screen-dark">
      <div class="status-bar" aria-hidden="true">
        <span class="js-time">9:41</span>
        <span class="status-icons"><i class="fa-solid fa-signal"></i><i class="fa-solid fa-wifi"></i><span class="battery"></span></span>
      </div>

      <section class="page no-tab flex flex-col justify-between">
        <div class="absolute inset-0">
          <img class="h-full w-full object-cover opacity-70" src="https://images.unsplash.com/photo-1492684223066-81342ee5ff30?auto=format&fit=crop&w=900&q=82" alt="演出现场人群正在拍摄短视频">
          <div class="absolute inset-0 bg-[linear-gradient(180deg,rgba(7,8,13,0.22),rgba(7,8,13,0.62)_42%,#07080d_82%)]"></div>
        </div>

        <header class="relative z-10 flex items-center justify-between">
          <div class="flex items-center gap-2 font-black text-xl">
            <span class="grid h-9 w-9 place-items-center rounded-2xl bg-white text-[#07111f]"><i class="fa-solid fa-bolt"></i></span>
            闪映
          </div>
          <a class="btn-secondary h-10 min-h-0 px-4" href="home.html" aria-label="跳过引导进入首页">跳过</a>
        </header>

        <div class="relative z-10">
          <div class="mb-6 flex gap-3 overflow-hidden" aria-label="内容预览">
            <img class="h-36 w-24 rounded-[22px] object-cover shadow-xl" src="https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?auto=format&fit=crop&w=420&q=82" alt="穿搭短视频预览">
            <img class="mt-8 h-36 w-24 rounded-[22px] object-cover shadow-xl" src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=420&q=82" alt="旅行短视频预览">
            <img class="h-36 w-24 rounded-[22px] object-cover shadow-xl" src="https://images.unsplash.com/photo-1512621776951-a57141f2eefd?auto=format&fit=crop&w=420&q=82" alt="美食短视频预览">
          </div>

          <h1 class="safe-title max-w-[320px]">用 30 秒发现灵感，也用 30 秒发布作品。</h1>
          <p class="mt-3 text-sm leading-6 text-slate-300">先选择兴趣，闪映会优先展示你真正想看的内容，并把创作模板放到最近的位置。</p>

          <div class="mt-5 flex flex-wrap gap-2" aria-label="兴趣选择">
            <button class="chip is-active" aria-pressed="true" data-group="interest" type="button">城市生活</button>
            <button class="chip" aria-pressed="false" data-group="interest" type="button">旅行</button>
            <button class="chip" aria-pressed="false" data-group="interest" type="button">美食</button>
            <button class="chip" aria-pressed="false" data-group="interest" type="button">运动</button>
            <button class="chip" aria-pressed="false" data-group="interest" type="button">学习</button>
          </div>

          <div class="mt-6 grid gap-3">
            <a class="btn-primary w-full" href="home.html"><i class="fa-solid fa-wand-magic-sparkles"></i> 开始体验</a>
            <button class="btn-secondary w-full" type="button" data-toast="已选择手机号登录流程"><i class="fa-regular fa-user"></i> 手机号登录</button>
          </div>
        </div>
      </section>
    </main>
  </div>
  <script src="prototype.js"></script>
</body>
</html>
