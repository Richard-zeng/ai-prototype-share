<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>闪映 · 设置</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="shared.css">
</head>
<body class="prototype-body">
  <div class="device-frame" role="img" aria-label="iPhone 15 原型外框">
    <main class="device-screen screen-light">
      <div class="status-bar" aria-hidden="true">
        <span class="js-time">9:41</span>
        <span class="status-icons"><i class="fa-solid fa-signal"></i><i class="fa-solid fa-wifi"></i><span class="battery"></span></span>
      </div>

      <section class="page">
        <header class="top-nav">
          <a class="icon-circle" href="profile.html" aria-label="返回个人主页"><i class="fa-solid fa-chevron-left"></i></a>
          <h1 class="m-0 text-base font-black">设置与安全</h1>
          <button class="icon-circle" type="button" data-toast="已打开帮助中心" aria-label="帮助"><i class="fa-regular fa-circle-question"></i></button>
        </header>

        <section class="mt-5 rounded-[28px] bg-[#07111f] p-4 text-white" aria-labelledby="comfort-title">
          <h2 id="comfort-title" class="m-0 text-lg font-black">观看舒适度</h2>
          <p class="m-0 mt-1 text-xs leading-5 text-slate-300">减少过度刺激内容，支持字幕、键盘操作和更清晰的触控反馈。</p>
          <div class="mt-4 grid grid-cols-2 gap-3">
            <button class="rounded-[20px] bg-white p-3 text-left text-[#07111f]" type="button" data-toggle aria-pressed="true" data-toast="字幕偏好已更新">
              <i class="fa-solid fa-closed-captioning text-[#21a9bb]"></i>
              <span class="mt-3 block text-sm font-black">默认字幕</span>
            </button>
            <button class="rounded-[20px] bg-white/10 p-3 text-left text-white" type="button" data-toggle aria-pressed="false" data-toast="减少动画已更新">
              <i class="fa-solid fa-person-walking-arrow-loop-left text-[#ffcc47]"></i>
              <span class="mt-3 block text-sm font-black">减少动画</span>
            </button>
          </div>
        </section>

        <section class="mt-5 grid gap-3" aria-label="设置列表">
          <article class="paper-panel p-4">
            <div class="row-item">
              <span class="grid h-11 w-11 place-items-center rounded-full bg-[#e5fbff] text-[#168b9a]"><i class="fa-solid fa-sliders"></i></span>
              <div>
                <h2 class="m-0 text-sm font-black">推荐内容偏好</h2>
                <p class="m-0 mt-1 text-xs font-semibold text-slate-500">管理不感兴趣、敏感主题和本地内容。</p>
              </div>
              <i class="fa-solid fa-chevron-right text-slate-300"></i>
            </div>
          </article>

          <article class="paper-panel p-4">
            <div class="row-item">
              <span class="grid h-11 w-11 place-items-center rounded-full bg-[#ffe8ef] text-[#c71f51]"><i class="fa-solid fa-comments"></i></span>
              <div>
                <h2 class="m-0 text-sm font-black">评论保护</h2>
                <p class="m-0 mt-1 text-xs font-semibold text-slate-500">过滤攻击、骚扰和重复刷屏。</p>
              </div>
              <button class="switch" type="button" aria-label="开启评论保护" aria-pressed="true" data-toggle data-toast="评论保护已切换"></button>
            </div>
          </article>

          <article class="paper-panel p-4">
            <div class="row-item">
              <span class="grid h-11 w-11 place-items-center rounded-full bg-[#edf7e8] text-[#248f54]"><i class="fa-solid fa-clock"></i></span>
              <div>
                <h2 class="m-0 text-sm font-black">屏幕时间提醒</h2>
                <p class="m-0 mt-1 text-xs font-semibold text-slate-500">连续观看 40 分钟后轻提示。</p>
              </div>
              <button class="switch" type="button" aria-label="开启屏幕时间提醒" aria-pressed="true" data-toggle data-toast="屏幕时间提醒已切换"></button>
            </div>
          </article>

          <article class="paper-panel p-4">
            <div class="row-item">
              <span class="grid h-11 w-11 place-items-center rounded-full bg-[#fff5d6] text-[#9d6b00]"><i class="fa-solid fa-download"></i></span>
              <div>
                <h2 class="m-0 text-sm font-black">离线缓存</h2>
                <p class="m-0 mt-1 text-xs font-semibold text-slate-500">仅 Wi-Fi 下载收藏夹。</p>
              </div>
              <button class="switch" type="button" aria-label="开启 Wi-Fi 离线缓存" aria-pressed="false" data-toggle data-toast="离线缓存已切换"></button>
            </div>
          </article>
        </section>
      </section>

      <nav class="tab-bar" aria-label="主导航">
        <a class="tab-item" href="home.html"><i class="fa-solid fa-house"></i><span>首页</span></a>
        <a class="tab-item" href="discover.html"><i class="fa-solid fa-magnifying-glass"></i><span>发现</span></a>
        <a class="tab-create" href="create.html" aria-label="创作"><i class="fa-solid fa-plus"></i></a>
        <a class="tab-item" href="inbox.html"><i class="fa-solid fa-inbox"></i><span>消息</span></a>
        <a class="tab-item active" href="profile.html" aria-current="page"><i class="fa-solid fa-user"></i><span>我的</span></a>
      </nav>
    </main>
  </div>
  <script src="prototype.js"></script>
</body>
</html>
