<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>闪映 · 消息</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="shared.css">
</head>
<body class="prototype-body">
  <div class="device-frame" role="img" aria-label="iPhone 15 原型外框">
    <main class="device-screen screen-light">
      <div class="status-bar" aria-hidden="true">
        <span class="js-time">9:41</span>
        <span class="status-icons"><i class="fa-solid fa-signal"></i><i class="fa-solid fa-wifi"></i><span class="battery"></span></span>
      </div>

      <section class="page">
        <header class="top-nav">
          <div>
            <h1 class="m-0 text-2xl font-black">消息</h1>
            <p class="m-0 mt-1 text-xs font-bold text-slate-500">互动、私信与创作者通知</p>
          </div>
          <button class="icon-circle" type="button" data-toggle data-toast="已开启免打扰" aria-pressed="false" aria-label="免打扰">
            <i class="fa-regular fa-bell"></i>
          </button>
        </header>

        <div class="mt-5 grid grid-cols-3 gap-2 rounded-full bg-slate-200 p-1" role="tablist" aria-label="消息分类">
          <button class="rounded-full bg-white py-2 text-sm font-black shadow-sm" data-group="inbox" aria-pressed="true" type="button">全部</button>
          <button class="rounded-full py-2 text-sm font-black text-slate-500" data-group="inbox" aria-pressed="false" type="button">互动</button>
          <button class="rounded-full py-2 text-sm font-black text-slate-500" data-group="inbox" aria-pressed="false" type="button">私信</button>
        </div>

        <section class="mt-5 rounded-[28px] bg-[#07111f] p-4 text-white" aria-labelledby="creator-inbox">
          <div class="flex items-center justify-between">
            <div>
              <h2 id="creator-inbox" class="m-0 text-lg font-black">创作者收件箱</h2>
              <p class="m-0 mt-1 text-xs text-slate-300">优先处理品牌合作和高赞评论。</p>
            </div>
            <span class="grid h-9 w-9 place-items-center rounded-full bg-[#ffcc47] text-[#07111f]"><i class="fa-solid fa-star"></i></span>
          </div>
          <div class="mt-4 grid grid-cols-3 gap-2 text-center">
            <div class="rounded-2xl bg-white/10 p-3"><strong class="block text-xl">18</strong><span class="text-[11px] text-slate-300">待回复</span></div>
            <div class="rounded-2xl bg-white/10 p-3"><strong class="block text-xl">4</strong><span class="text-[11px] text-slate-300">合作</span></div>
            <div class="rounded-2xl bg-white/10 p-3"><strong class="block text-xl">92%</strong><span class="text-[11px] text-slate-300">正向</span></div>
          </div>
        </section>

        <section class="mt-5 grid gap-2" aria-label="消息列表">
          <article class="paper-panel row-item p-3">
            <span class="grid h-11 w-11 place-items-center rounded-full bg-[#e5fbff] text-[#168b9a]"><i class="fa-solid fa-heart"></i></span>
            <div>
              <h2 class="m-0 text-sm font-black">你的作品获得 12k 个喜欢</h2>
              <p class="m-0 mt-1 text-xs font-semibold text-slate-500">夜市穿搭挑战正在上升。</p>
            </div>
            <span class="text-xs font-bold text-slate-400">刚刚</span>
          </article>
          <article class="paper-panel row-item p-3">
            <img class="avatar-sm" src="https://images.unsplash.com/photo-1508214751196-bcfd4ca60f91?auto=format&fit=crop&w=200&q=82" alt="Mina 头像">
            <div>
              <h2 class="m-0 text-sm font-black">Mina 评论了你</h2>
              <p class="m-0 mt-1 text-xs font-semibold text-slate-500">“这个字幕模板太好用了。”</p>
            </div>
            <button class="text-xs font-black text-[#168b9a]" type="button" data-toast="已打开快捷回复">回复</button>
          </article>
          <article class="paper-panel row-item p-3">
            <img class="avatar-sm" src="https://images.unsplash.com/photo-1568602471122-7832951cc4c5?auto=format&fit=crop&w=200&q=82" alt="品牌方头像">
            <div>
              <h2 class="m-0 text-sm font-black">UrbanBag 邀请合作</h2>
              <p class="m-0 mt-1 text-xs font-semibold text-slate-500">预算与脚本要求已发送。</p>
            </div>
            <span class="pill bg-[#ff3d71] text-white">新</span>
          </article>
          <article class="paper-panel row-item p-3">
            <span class="grid h-11 w-11 place-items-center rounded-full bg-[#fff5d6] text-[#9d6b00]"><i class="fa-solid fa-shield-heart"></i></span>
            <div>
              <h2 class="m-0 text-sm font-black">评论保护已拦截 6 条风险内容</h2>
              <p class="m-0 mt-1 text-xs font-semibold text-slate-500">可在设置中调整过滤强度。</p>
            </div>
            <i class="fa-solid fa-chevron-right text-slate-300"></i>
          </article>
        </section>
      </section>

      <nav class="tab-bar" aria-label="主导航">
        <a class="tab-item" href="home.html"><i class="fa-solid fa-house"></i><span>首页</span></a>
        <a class="tab-item" href="discover.html"><i class="fa-solid fa-magnifying-glass"></i><span>发现</span></a>
        <a class="tab-create" href="create.html" aria-label="创作"><i class="fa-solid fa-plus"></i></a>
        <a class="tab-item active" href="inbox.html" aria-current="page"><i class="fa-solid fa-inbox"></i><span>消息</span></a>
        <a class="tab-item" href="profile.html"><i class="fa-solid fa-user"></i><span>我的</span></a>
      </nav>
    </main>
  </div>
  <script src="prototype.js"></script>
</body>
</html>
